name: meetwise

x-app-environment: &app-environment
  NODE_ENV: production
  DEPLOYMENT_MODE: server
  HOST: 0.0.0.0
  PORT: 4317
  PUBLIC_BASE_URL: https://${PUBLIC_HOST:?Set PUBLIC_HOST}
  DATABASE_URL: postgresql://meetwise:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/meetwise
  SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET}
  TOKEN_SIGNING_SECRET: ${TOKEN_SIGNING_SECRET:?Set TOKEN_SIGNING_SECRET}
  OLLAMA_URL: http://ollama:11434
  OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
  TRUST_PROXY: '1'
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set exact extension origin}
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: 'true'
    depends_on:
      postgres: { condition: service_healthy }
      ollama: { condition: service_started }
    read_only: true
    tmpfs: ['/tmp:size=64m,mode=1777']
    security_opt: ['no-new-privileges:true']
    cap_drop: ['ALL']
    networks: [frontend, backend]

  worker:
    build: .
    command: ['node', 'dist-server/server/worker.js']
    restart: unless-stopped
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: 'false'
    depends_on:
      app: { condition: service_healthy }
    read_only: true
    tmpfs: ['/tmp:size=64m,mode=1777']
    security_opt: ['no-new-privileges:true']
    cap_drop: ['ALL']
    networks: [backend]

  postgres:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: meetwise
      POSTGRES_USER: meetwise
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes: ['postgres-data:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U meetwise -d meetwise']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  ollama:
    image: ollama/ollama:0.6.8
    restart: unless-stopped
    volumes: ['ollama-data:/root/.ollama']
    networks: [backend]

  caddy:
    image: caddy:2.10.0-alpine
    restart: unless-stopped
    environment: { PUBLIC_HOST: '${PUBLIC_HOST:?Set PUBLIC_HOST}' }
    ports: ['80:80', '443:443', '443:443/udp']
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: { app: { condition: service_healthy } }
    security_opt: ['no-new-privileges:true']
    networks: [frontend]

networks:
  frontend: {}
  backend: { internal: true }
volumes:
  postgres-data: {}
  ollama-data: {}
  caddy-data: {}
  caddy-config: {}
