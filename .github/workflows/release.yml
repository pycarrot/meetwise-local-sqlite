name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.5-alpine
        env:
          POSTGRES_USER: meetwise
          POSTGRES_PASSWORD: test-only
          POSTGRES_DB: meetwise_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U meetwise -d meetwise_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://meetwise:test-only@127.0.0.1:5432/meetwise_test
      NODE_ENV: test
      DEPLOYMENT_MODE: local
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run test:integration
      - run: npm run check
        env:
          EXTENSION_SERVER_URL: ${{ vars.EXTENSION_SERVER_URL }}
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/*.zip --generate-notes --verify-tag
