name: Feature request
description: Propose a focused improvement
title: '[Feature]: '
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user problem without including private meeting content.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy impact
      options:
        - label: This proposal keeps meeting data local by default.
          required: true
