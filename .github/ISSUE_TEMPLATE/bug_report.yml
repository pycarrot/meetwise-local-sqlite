name: Bug report
description: Report a reproducible problem in Meetwise Local
title: '[Bug]: '
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Please remove meeting content, names, tokens, and other private data before posting logs.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [Chrome extension, Dashboard, Local API, Ollama analysis, Installation, Other]
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and reproduction steps
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, Chrome, Ollama, and model versions. Do not include transcript data.
    validations:
      required: true
